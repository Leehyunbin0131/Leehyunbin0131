name: Update D-Day Badge

on:
  schedule:
    - cron: '0 15 * * *' # 매일 한국 시간 기준 자정에 실행
  workflow_dispatch: # 수동 실행 가능

# --- 이 블록을 추가합니다 ---
permissions:
  contents: write
# -----------------------------

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Calculate D-Day
        run: |
          START_DATE=$(date -d "2026-04-01" +%s)
          CURRENT_DATE=$(date +%s)
          DAYS=$(( (CURRENT_DATE - START_DATE) / 86400 ))
          sed -i "s/Day-[0-9]\+_Since_April_1st/Day-${DAYS}_Since_April_1st/g" README.md
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update D-Day count" || exit 0
          git push
